<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <!-- Bootstrap 5 CDN -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <!-- เมนู -->
    <div id="menu-container"></div>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="text-center mb-4" style="color: #34495e;">Register</h2>

                <form>
                    <div class="mb-3">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="fullName">
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email">
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" id="phone">
                    </div>

                    <div class="mb-3">
                        <label for="course" class="form-label">Select Course</label>
                        <select class="form-select" id="course">
                            <option selected disabled value=""></option>
                            <option value="1">Course 1 Learn the basics of web development.</option>
                            <option value="2">Course 2 Advance your knowledge in Python programming.</option>
                            <option value="3">Course 3 Master data analysis with Power BI.</option>
                        </select>
                        <div class="text-center mt-3">
                            <small><a href="sunshine.html">You want some sunshine?</a></small>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary px-4">Register</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/menu.js"></script>
